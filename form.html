<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificação Panoptic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/form.css" />
</head>
<body>

    <header class="top-bar">
        <button id="menuToggle" class="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="logo-container">
            <img src="img/Vector.png" alt="Panoptic Logo" class="logo-img">
        </div>
    </header>

    <div id="overlay" class="overlay"></div>

    <div id="customAlert" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div class="custom-alert-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h3 class="custom-alert-title">Boa!</h3>
            <p class="custom-alert-message">Teste de certificação completo!</p>
            <button id="closeCustomAlert" class="custom-alert-btn">Fechar</button>
        </div>
    </div>

    <main class="container-fluid main-content d-flex flex-column align-items-center justify-content-center">
        
        <div class="blue-card">
            <div class="card-body-content">
                
                <div class="mb-4 w-100">
                    <label for="pergunta1" class="form-label text-white fw-bold">Pergunta 1:</label>
                    <input type="text" id="pergunta1" class="form-control custom-input" placeholder="Digite sua resposta aqui...">
                </div>

                <div class="mb-4 w-100">
                    <label for="pergunta2" class="form-label text-white fw-bold">Pergunta 2:</label>
                    <input type="text" id="pergunta2" class="form-control custom-input" placeholder="Digite sua resposta aqui...">
                </div>

                <button id="btnEnviar" class="btn-enviar">ENVIAR RESPOSTA</button>

            </div>
        </div>

    </main>

    <script src="js/form.js"></script>
</body>
</html>
